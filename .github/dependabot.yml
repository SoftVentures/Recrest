version: 2
updates:
  # Alle npm-Workspaces in einem Eintrag — `directories:` (Plural) fasst
  # Updates über alle Pfade hinweg zu gemeinsamen PRs zusammen.
  - package-ecosystem: npm
    directories:
      - "/"
      - "/app"
      - "/shared"
      - "/tests"
      - "/landingpage"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: "dependabot"
      prefix-development: "dependabot(dev)"
    groups:
      npm-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      npm-majors:
        patterns: ["*"]
        update-types: ["major"]

  # Rust backend
  - package-ecosystem: cargo
    directory: "/app/src-tauri"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: "dependabot"
    groups:
      cargo-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      cargo-majors:
        patterns: ["*"]
        update-types: ["major"]

  # CI actions pinned via `uses:`
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    commit-message:
      prefix: "dependabot"
    groups:
      actions-all:
        patterns: ["*"]

version: 2
updates:
  # Root workspace (yarn workspaces)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      majors:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      radix:
        patterns: ["@radix-ui/*"]
      tauri:
        patterns: ["@tauri-apps/*"]
      storybook:
        patterns: ["@storybook/*", "storybook"]
      testing:
        patterns: ["@testing-library/*", "vitest", "jsdom"]
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      majors:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: npm
    directory: "/shared"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/tests"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/landingpage"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      all:
        patterns: ["*"]

  # Rust backend
  - package-ecosystem: cargo
    directory: "/app/src-tauri"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      majors:
        patterns: ["*"]
        update-types: ["major"]

  # CI actions pinned via `uses:`
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    commit-message:
      prefix: "chore(ci)"
    groups:
      all:
        patterns: ["*"]

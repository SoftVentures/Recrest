# Manuell ausgelöster Tauri-Build für Beta-Installer aus `develop` (oder einem
# beliebigen Ref). Führt KEINEN Version-Bump durch und legt KEIN GitHub-Release
# an. Matrix-Jobs liefern Installer in OS-spezifische Staging-Artifacts; der
# collect-Job konsolidiert sie in EIN Artifact mit `windows/`, `macos/`,
# `linux/`-Unterordnern.
name: Release (Tauri Beta)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref (branch, tag, SHA) to build"
        default: develop
        required: false

permissions:
  contents: read

jobs:
  # Regenerate NSIS / DMG branding bitmaps once from the SVG sources and share
  # them with every platform build. tauri.conf.json references the generated
  # files — without them Windows NSIS + macOS DMG bundling fail.
  prepare-assets:
    name: Generate installer assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn workspace @recrest/app gen:installer-assets
      - uses: actions/upload-artifact@v7
        with:
          name: installer-assets-build
          path: app/src-tauri/installer-assets/build/
          retention-days: 1
          if-no-files-found: error

  build:
    needs: prepare-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macos
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            os: linux
            args: ""
          - platform: windows-latest
            os: windows
            args: ""
    runs-on: ${{ matrix.platform }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - uses: ./.github/actions/install-deps

      - name: Download installer-asset bitmaps
        uses: actions/download-artifact@v8
        with:
          name: installer-assets-build
          path: app/src-tauri/installer-assets/build/

      # Forward signing secrets only when populated. Tauri's bundler reads the
      # signing env vars via `std::env::var`, which returns `Ok("")` for set-
      # but-empty — not `Err(NotPresent)`. Piping `${{ secrets.FOO }}` directly
      # into `env:` therefore triggers sign/notarize paths even when FOO is
      # unset in the repo, failing e.g. `security import` with an empty .p12.
      # This step writes each secret to $GITHUB_ENV only if non-empty, so
      # missing secrets stay genuinely unset and Tauri skips the feature.
      - name: Forward signing secrets (when configured)
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -eu
          forward() {
            local name="$1"
            local val="${!name-}"
            if [ -n "$val" ]; then
              {
                printf '%s<<__RECREST_EOF__\n' "$name"
                printf '%s\n' "$val"
                printf '__RECREST_EOF__\n'
              } >> "$GITHUB_ENV"
              echo "forwarded: $name"
            else
              echo "skipped (empty): $name"
            fi
          }
          forward APPLE_CERTIFICATE
          forward APPLE_CERTIFICATE_PASSWORD
          forward APPLE_SIGNING_IDENTITY
          forward APPLE_ID
          forward APPLE_PASSWORD
          forward APPLE_TEAM_ID
          forward WINDOWS_CERTIFICATE
          forward WINDOWS_CERTIFICATE_PASSWORD
          forward TAURI_SIGNING_PRIVATE_KEY
          forward TAURI_SIGNING_PRIVATE_KEY_PASSWORD

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          args: ${{ matrix.args }}
          projectPath: ./app

      - name: Stage installers under OS folder
        shell: bash
        run: |
          mkdir -p "stage/${{ matrix.os }}"
          shopt -s globstar nullglob
          for f in \
            app/src-tauri/target/**/release/bundle/**/*.dmg \
            app/src-tauri/target/**/release/bundle/**/*.msi \
            app/src-tauri/target/**/release/bundle/**/*.exe \
            app/src-tauri/target/**/release/bundle/**/*.AppImage \
            app/src-tauri/target/**/release/bundle/**/*.deb \
            app/src-tauri/target/**/release/bundle/**/*.rpm; do
            cp "$f" "stage/${{ matrix.os }}/" 2>/dev/null || true
          done
          ls -la "stage/${{ matrix.os }}" || true

      - name: Upload staging artifact (${{ matrix.os }})
        uses: actions/upload-artifact@v7
        with:
          name: recrest-beta-staging-${{ matrix.os }}
          path: stage/
          if-no-files-found: warn
          retention-days: 1

  collect:
    name: Collect into single artifact with OS folders
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build.result != 'cancelled' }}
    steps:
      - name: Download all staging artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: recrest-beta-staging-*
          path: merged/
          merge-multiple: true

      - name: List merged tree
        run: ls -R merged || true

      - name: Upload consolidated artifact
        uses: actions/upload-artifact@v7
        with:
          name: recrest-beta-${{ github.sha }}
          path: merged/
          if-no-files-found: warn
          retention-days: 14

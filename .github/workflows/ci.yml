name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch name
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate head branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          pattern='^(main|develop|(feature|bugfix|patch|docs|test|ci|revert|release|hotfix|dependabot)\/.+)$'
          if ! printf '%s' "$HEAD_REF" | grep -Eq "$pattern"; then
            echo "::error::Branch name '$HEAD_REF' does not match the required pattern."
            echo "Allowed: main, develop, <type>/<topic> with type ∈ feature|bugfix|patch|docs|test|ci|revert|release|hotfix, or dependabot/*"
            exit 1
          fi
          echo "OK: $HEAD_REF"

  dependabot-type:
    name: dependabot commit-type reserved
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check for dependabot-typed commits by non-bot authors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "PR author is dependabot[bot] — nothing to enforce."
            exit 0
          fi

          offenders="$(git log --format='%h %s' "$BASE_SHA..$HEAD_SHA" | grep -E '^[0-9a-f]+ dependabot(\([^)]*\))?!?:' || true)"

          if [ -n "$offenders" ]; then
            echo "::error::Commit type 'dependabot' is reserved for dependabot[bot]."
            echo "The following commits use the prefix without authorisation:"
            printf '%s\n' "$offenders"
            echo ""
            echo "Fix: use a different allowed type (e.g. ci, patch, bugfix)."
            exit 1
          fi

          echo "OK: no dependabot commits authored by non-bot users."

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn lint

  format:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn format:check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn test

  e2e:
    name: Playwright E2E (optional)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - name: Seed .env for legal-imprint tests
        run: |
          cat > .env <<'EOF'
          VITE_IMPRINT_NAME="Recrest Test Deployment"
          VITE_IMPRINT_STREET="Teststraße 42"
          VITE_IMPRINT_POSTAL_CODE="10115"
          VITE_IMPRINT_CITY="Berlin"
          VITE_IMPRINT_COUNTRY="Deutschland"
          VITE_IMPRINT_EMAIL="legal@example.com"
          VITE_IMPRINT_PHONE="+49 30 0000000"
          VITE_IMPRINT_RESPONSIBLE_PERSON="Max Mustermann"
          EOF
      - name: Install Playwright browsers
        run: yarn workspace @recrest/tests exec playwright install --with-deps
      - run: yarn test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 7

  storybook:
    name: Storybook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn workspace @recrest/app build-storybook

  web-build:
    name: Web production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn workspace @recrest/shared build
      - run: yarn workspace @recrest/app build

  landingpage-build:
    name: Landingpage production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn build:landingpage

  # Aggregate required-status-check referenced by Branch Protection.
  # Keeps the protection rule stable even if we rename or split jobs above.
  ci-pass:
    name: CI pass
    runs-on: ubuntu-latest
    needs:
      [
        branch-name,
        dependabot-type,
        typecheck,
        lint,
        format,
        test,
        storybook,
        web-build,
        landingpage-build,
      ]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."

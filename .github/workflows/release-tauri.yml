# Triggered by the tag that release-please creates when its Release PR is merged.
# Builds Tauri installers for Linux / Windows / macOS, bündelt sie pro OS in
# ein ZIP (`recrest-<tag>-windows.zip` / `-macos.zip` / `-linux.zip`) und lädt
# diese als GitHub-Release-Assets hoch. Runs unsigned until
# TAURI_SIGNING_PRIVATE_KEY is populated — signing secrets are passed through
# only when they exist.
name: Release (Tauri)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Generates the NSIS / DMG branding bitmaps from the SVG sources once on
  # Linux and passes them to every platform build via an artifact. The
  # `tauri.conf.json` references these files directly; without them, the
  # Windows NSIS bundler fails with `os error 3` and the macOS DMG bundler
  # aborts in `bundle_dmg.sh`.
  prepare-assets:
    name: Generate installer assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn workspace @recrest/app gen:installer-assets
      - uses: actions/upload-artifact@v4
        with:
          name: installer-assets-build
          path: app/src-tauri/installer-assets/build/
          retention-days: 1
          if-no-files-found: error

  build:
    needs: prepare-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    # Each OS is independent; one platform failing should not block the other
    # two from publishing their installers. Missing assets can be attached
    # manually (gh release upload) or by re-running the failed leg once fixed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - uses: ./.github/actions/install-deps

      - name: Download installer-asset bitmaps
        uses: actions/download-artifact@v4
        with:
          name: installer-assets-build
          path: app/src-tauri/installer-assets/build/

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo 'body<<EOF'
            cat RELEASE.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (unsigned)
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY == '' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Recrest ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: ./app

      - name: Build Tauri app (signed)
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Recrest ${{ github.ref_name }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: ./app

  # Lädt alle Einzel-Installer vom Draft-Release runter, packt sie per OS in
  # ein ZIP (`recrest-<tag>-windows.zip` usw.), lädt die ZIPs hoch und entfernt
  # die ursprünglichen Einzel-Assets, damit die Release-Seite drei klare
  # Download-Pakete statt einer langen Dateiliste zeigt.
  repackage:
    name: Repackage into per-OS ZIPs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dl
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir dl \
            --pattern '*.dmg' \
            --pattern '*.msi' \
            --pattern '*.exe' \
            --pattern '*.AppImage' \
            --pattern '*.deb' \
            --pattern '*.rpm' \
            --pattern '*.app.tar.gz' \
            || true
          ls -la dl || true

      - name: Group files per OS and zip
        id: zip
        run: |
          set -euo pipefail
          mkdir -p stage/windows stage/macos stage/linux

          shopt -s nullglob
          for f in dl/*.msi dl/*.exe; do
            mv "$f" stage/windows/
          done
          for f in dl/*.dmg dl/*.app.tar.gz; do
            mv "$f" stage/macos/
          done
          for f in dl/*.AppImage dl/*.deb dl/*.rpm; do
            mv "$f" stage/linux/
          done

          tag="${{ github.ref_name }}"
          mkdir -p out
          produced=()
          for os in windows macos linux; do
            if [ -n "$(ls -A "stage/$os" 2>/dev/null)" ]; then
              zip_name="recrest-${tag}-${os}.zip"
              (cd stage && zip -r "../out/$zip_name" "$os")
              produced+=("out/$zip_name")
              echo "built: $zip_name"
            else
              echo "skip: no assets for $os"
            fi
          done

          if [ "${#produced[@]}" -eq 0 ]; then
            echo "no per-OS zips produced — leaving release assets untouched"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "uploaded=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${produced[@]}" > zips.list

      - name: Upload per-OS ZIPs
        if: steps.zip.outputs.uploaded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xargs -a zips.list gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Remove original single-installer assets
        if: steps.zip.outputs.uploaded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for f in dl/*; do
            [ -f "$f" ] || continue
            asset="$(basename "$f")"
            echo "deleting old asset: $asset"
            gh release delete-asset "${{ github.ref_name }}" "$asset" \
              --repo "${{ github.repository }}" \
              --yes || true
          done

  checksums:
    name: Checksums
    needs: repackage
    runs-on: ubuntu-latest
    steps:
      - name: Download per-OS zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --pattern '*.zip' \
            || true
      - name: Compute SHA256SUMS
        run: |
          cd assets
          if compgen -G "*.zip" > /dev/null; then
            sha256sum *.zip > SHA256SUMS.txt
            cat SHA256SUMS.txt
          else
            echo "no zip assets found — skipping checksum step"
            exit 0
          fi
      - name: Upload checksums to release
        if: hashFiles('assets/SHA256SUMS.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            assets/SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --clobber

# Triggered automatically by the tag that release-please creates when its
# Release PR is merged. Can also be re-run manually against an existing tag
# (defaults to the latest release) — the manual path deletes the current
# release but keeps the git tag, so assets get rebuilt from scratch without
# having to bump the version or rewrite the tag.
#
# Builds Tauri installers for Linux / Windows / macOS, bündelt sie pro OS in
# ein ZIP (`recrest-<tag>-windows.zip` / `-macos.zip` / `-linux.zip`) und lädt
# diese als GitHub-Release-Assets hoch. Signing/notarization features activate
# automatically when the matching secrets are populated.
name: Release (Tauri)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild (e.g. v0.7.0). Leave empty to rebuild the latest release."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # Resolve the target tag once and share it with every downstream job. For a
  # `push` trigger this is `github.ref_name`; for `workflow_dispatch` it's the
  # input (when set) or the most recent release tag (draft or published).
  # Downstream jobs must use `needs.resolve.outputs.tag` instead of
  # `github.ref_name`, because on manual dispatch from a branch the ref is the
  # branch (e.g. `main`), not the release tag.
  resolve:
    name: Resolve target tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eu
          if [ "$EVENT" = "push" ]; then
            resolved="$REF_NAME"
            echo "Resolved from push tag: $resolved"
          elif [ -n "${INPUT_TAG:-}" ]; then
            resolved="$INPUT_TAG"
            echo "Resolved from dispatch input: $resolved"
          else
            resolved="$(gh release list --repo "$REPO" --limit 1 --json tagName --jq '.[0].tagName' || true)"
            if [ -z "$resolved" ]; then
              echo "::error::No existing release found and no tag input provided."
              exit 1
            fi
            echo "Resolved from latest release: $resolved"
          fi
          echo "tag=$resolved" >> "$GITHUB_OUTPUT"

  # Generates the NSIS / DMG branding bitmaps from the SVG sources once on
  # Linux and passes them to every platform build via an artifact. The
  # `tauri.conf.json` references these files directly; without them, the
  # Windows NSIS bundler fails with `os error 3` and the macOS DMG bundler
  # aborts in `bundle_dmg.sh`.
  #
  # For a manual re-run this job also resets the existing release so
  # `tauri-action` can recreate it cleanly (otherwise it would collide on
  # asset names and leave stale files behind). The git tag is preserved.
  prepare-assets:
    name: Generate installer assets
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Reset existing release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eu
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Deleting existing release $TAG (git tag is preserved via --cleanup-tag=false)"
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag=false
          else
            echo "No existing release for $TAG — nothing to reset"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn
      - uses: ./.github/actions/install-deps
      - run: yarn workspace @recrest/app gen:installer-assets
      - uses: actions/upload-artifact@v7
        with:
          name: installer-assets-build
          path: app/src-tauri/installer-assets/build/
          retention-days: 1
          if-no-files-found: error

  build:
    needs: [resolve, prepare-assets]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    # Each OS is independent; one platform failing should not block the other
    # two from publishing their installers. Missing assets can be attached
    # manually (gh release upload) or by re-running the failed leg once fixed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./app/src-tauri -> target"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - uses: ./.github/actions/install-deps

      - name: Download installer-asset bitmaps
        uses: actions/download-artifact@v8
        with:
          name: installer-assets-build
          path: app/src-tauri/installer-assets/build/

      - name: Guard against unpopulated updater pubkey
        shell: bash
        run: |
          if grep -q 'REPLACE_WITH_MINISIGN_PUBKEY' app/src-tauri/tauri.conf.json; then
            echo "::error::tauri.conf.json still contains the updater pubkey placeholder."
            exit 1
          fi

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo 'body<<EOF'
            cat RELEASE.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Forward signing secrets only when populated. Tauri's bundler reads the
      # signing env vars via `std::env::var`, which returns `Ok("")` for set-
      # but-empty — not `Err(NotPresent)`. Piping `${{ secrets.FOO }}` directly
      # into `env:` therefore triggers sign/notarize paths even when FOO is
      # unset in the repo, failing e.g. `security import` with an empty .p12.
      # This step writes each secret to $GITHUB_ENV only if non-empty, so
      # missing secrets stay genuinely unset and Tauri skips the feature.
      - name: Forward signing secrets (when configured)
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -eu
          forward() {
            local name="$1"
            local val="${!name-}"
            if [ -n "$val" ]; then
              {
                printf '%s<<__RECREST_EOF__\n' "$name"
                printf '%s\n' "$val"
                printf '__RECREST_EOF__\n'
              } >> "$GITHUB_ENV"
              echo "forwarded: $name"
            else
              echo "skipped (empty): $name"
            fi
          }
          forward APPLE_CERTIFICATE
          forward APPLE_CERTIFICATE_PASSWORD
          forward APPLE_SIGNING_IDENTITY
          forward APPLE_ID
          forward APPLE_PASSWORD
          forward APPLE_TEAM_ID
          forward WINDOWS_CERTIFICATE
          forward WINDOWS_CERTIFICATE_PASSWORD
          forward TAURI_SIGNING_PRIVATE_KEY
          forward TAURI_SIGNING_PRIVATE_KEY_PASSWORD

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: "Recrest ${{ needs.resolve.outputs.tag }}"
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: ./app

  # Lädt alle Einzel-Installer vom Draft-Release runter, packt sie per OS in
  # ein ZIP (`recrest-<tag>-windows.zip` usw.), lädt die ZIPs hoch und entfernt
  # die ursprünglichen Einzel-Assets, damit die Release-Seite drei klare
  # Download-Pakete statt einer langen Dateiliste zeigt.
  repackage:
    name: Repackage into per-OS ZIPs
    needs: [resolve, build]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dl
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir dl \
            --pattern '*.dmg' \
            --pattern '*.msi' \
            --pattern '*.exe' \
            --pattern '*.AppImage' \
            --pattern '*.deb' \
            --pattern '*.rpm' \
            --pattern '*.app.tar.gz' \
            --pattern '*.sig' \
            --pattern 'latest.json' \
            || true
          ls -la dl || true

      - name: Group files per OS and zip
        id: zip
        run: |
          set -euo pipefail
          mkdir -p stage/windows stage/macos stage/linux

          shopt -s nullglob
          for f in dl/*.msi dl/*.exe; do
            mv "$f" stage/windows/
          done
          for f in dl/*.dmg dl/*.app.tar.gz; do
            mv "$f" stage/macos/
          done
          for f in dl/*.AppImage dl/*.deb dl/*.rpm; do
            mv "$f" stage/linux/
          done

          mkdir -p out
          produced=()
          for os in windows macos linux; do
            if [ -n "$(ls -A "stage/$os" 2>/dev/null)" ]; then
              zip_name="recrest-${TAG}-${os}.zip"
              (cd stage && zip -r "../out/$zip_name" "$os")
              produced+=("out/$zip_name")
              echo "built: $zip_name"
            else
              echo "skip: no assets for $os"
            fi
          done

          if [ "${#produced[@]}" -eq 0 ]; then
            echo "no per-OS zips produced — leaving release assets untouched"
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "uploaded=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${produced[@]}" > zips.list

      - name: Upload per-OS ZIPs
        if: steps.zip.outputs.uploaded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Explicit per-file loop with visible logging. An earlier `xargs -a
          # zips.list gh release upload ...` version occasionally completed
          # silently without actually publishing the zips, leaving 404s on
          # the release page. This loop makes each upload observable and fails
          # loudly on any individual upload error.
          while IFS= read -r zipfile; do
            [ -n "$zipfile" ] || continue
            echo "uploading: $zipfile"
            gh release upload "$TAG" "$zipfile" \
              --repo "${{ github.repository }}" \
              --clobber
          done < zips.list

      - name: Prune single-installer assets (keep updater + zip + checksums)
        if: steps.zip.outputs.uploaded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Iterate over the actual release assets (not dl/, which was drained
          # by the zip step) and keep only what the updater / download flow
          # still needs:
          #   *.msi          — Windows updater payload (tauri-action updater bundle)
          #   *.app.tar.gz   — macOS updater payload
          #   *.AppImage     — Linux updater payload
          #   *.sig          — Minisign signatures for updater payloads
          #   latest.json    — updater manifest
          #   *.zip          — per-OS packages users actually download
          #   SHA256SUMS.txt — checksums file added by the `checksums` job
          # Everything else (.dmg / .deb / .rpm / .exe) is bundled inside the
          # per-OS ZIP and duplicates the download list — remove to keep the
          # release page focused.
          keep_patterns=("*.msi" "*.app.tar.gz" "*.AppImage" "*.sig" "latest.json" "*.zip" "SHA256SUMS.txt")
          assets="$(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[].name')"
          while IFS= read -r asset; do
            [ -n "$asset" ] || continue
            keep=0
            for p in "${keep_patterns[@]}"; do
              case "$asset" in $p) keep=1;; esac
            done
            if [ "$keep" = 1 ]; then
              echo "keep: $asset"
              continue
            fi
            echo "deleting: $asset"
            gh release delete-asset "$TAG" "$asset" \
              --repo "${{ github.repository }}" \
              --yes
          done <<< "$assets"

  checksums:
    name: Checksums
    needs: [resolve, repackage]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - name: Download per-OS zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --pattern '*.zip' \
            || true
      - name: Compute SHA256SUMS
        run: |
          cd assets
          if compgen -G "*.zip" > /dev/null; then
            sha256sum *.zip > SHA256SUMS.txt
            cat SHA256SUMS.txt
          else
            echo "no zip assets found — skipping checksum step"
            exit 0
          fi
      - name: Upload checksums to release
        if: hashFiles('assets/SHA256SUMS.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" \
            assets/SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --clobber

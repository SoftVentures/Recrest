<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <title>Recrest DMG drag-to-install background</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14171E"/>
      <stop offset="1" stop-color="#0B0D12"/>
    </linearGradient>
  </defs>
  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- Brand header -->
  <g transform="translate(276, 40)" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 16 L18 0 L36 16"/>
    <path d="M0 25 L18 9 L36 25" opacity="0.5"/>
  </g>
  <text x="322" y="62" font-family="-apple-system, Inter, system-ui, Arial, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" letter-spacing="-0.3">Recrest</text>

  <!-- Arrow from app icon (~x=180, y=170) to Applications (~x=480, y=170).
       Icons are ~64px; arrow in the gap between them at the same y. -->
  <g stroke="#4B5563" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 250 170 L 408 170"/>
    <polyline points="390,156 414,170 390,184"/>
  </g>

  <!-- Instruction -->
  <text x="330" y="340" font-family="-apple-system, Inter, system-ui, Arial, sans-serif" font-size="13" text-anchor="middle" fill="#9CA3AF" letter-spacing="0.1">Drag Recrest to Applications to install</text>
</svg>

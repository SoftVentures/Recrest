<svg xmlns="http://www.w3.org/2000/svg" width="164" height="314" viewBox="0 0 164 314" role="img">
  <title>Recrest — NSIS installer sidebar</title>
  <desc>Export to nsis-sidebar.bmp (164x314, 24-bit). Shown on Welcome + Finish pages.</desc>
  <defs>
    <radialGradient id="sidebar-glow" cx="50%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#d97757" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="164" height="314" fill="#0F1115"/>
  <rect width="164" height="314" fill="url(#sidebar-glow)"/>

  <!-- Logo mark -->
  <g transform="translate(42, 72)">
    <rect width="80" height="80" rx="18" fill="#FFFFFF"/>
    <g transform="translate(20, 26)" fill="none" stroke="#0F1115" stroke-linecap="round" stroke-linejoin="round" stroke-width="4.2">
      <path d="M0 18 L20 0 L40 18"/>
      <path d="M0 30 L20 12 L40 30" opacity="0.5"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="82" y="184" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="-0.4">Recrest</text>
  <text x="82" y="204" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" fill="#a4a4b2" letter-spacing="0.2">Developer dashboard</text>

  <!-- Footer mark -->
  <text x="82" y="292" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="500" fill="#747480" letter-spacing="0.4">SoftVentures</text>
</svg>

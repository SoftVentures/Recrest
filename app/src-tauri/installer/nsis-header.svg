<svg xmlns="http://www.w3.org/2000/svg" width="150" height="57" viewBox="0 0 150 57" role="img">
  <title>Recrest — NSIS installer header</title>
  <desc>Export to nsis-header.bmp (150x57, 24-bit). Light background per NSIS Modern UI convention.</desc>
  <rect width="150" height="57" fill="#FFFFFF"/>
  <!-- Hairline bottom -->
  <rect x="0" y="56" width="150" height="1" fill="#ececee"/>
  <!-- Logo mark -->
  <g transform="translate(10, 12)">
    <rect width="34" height="34" rx="8" fill="#0F1115"/>
    <g transform="translate(9, 11)" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8">
      <path d="M0 8 L8 0 L16 8"/>
      <path d="M0 13 L8 5 L16 13" opacity="0.5"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="52" y="36" font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" fill="#0b0b0f" letter-spacing="-0.3">Recrest</text>
</svg>
